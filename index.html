<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>pinepor - App Developer</title>
  <meta name="description" content="pinepor - iOS App Developer. Games, tools, and utility apps for iPhone.">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
      background: #0a0a0a;
      color: #e0e0e0;
      min-height: 100vh;
    }

    header {
      padding: 60px 24px 40px;
      text-align: center;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    header h1 {
      font-size: 2rem;
      font-weight: 800;
      color: #fff;
      letter-spacing: -0.5px;
    }

    header p {
      margin-top: 8px;
      font-size: 0.95rem;
      color: #666;
    }

    main {
      max-width: 640px;
      margin: 0 auto;
      padding: 40px 24px 80px;
    }

    h2 {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: #555;
      margin-bottom: 16px;
    }

    .app-list {
      display: flex;
      flex-direction: column;
      gap: 2px;
      margin-bottom: 48px;
    }

    .app-card {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 16px;
      border-radius: 14px;
      text-decoration: none;
      color: inherit;
      transition: background 0.15s;
    }

    .app-card:hover { background: rgba(255,255,255,0.05); }

    .app-icon {
      width: 52px;
      height: 52px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      flex-shrink: 0;
    }

    .app-info { flex: 1; }

    .app-info h3 {
      font-size: 0.95rem;
      font-weight: 700;
      color: #fff;
      margin-bottom: 2px;
    }

    .app-info p {
      font-size: 0.8rem;
      color: #666;
    }

    .app-arrow {
      color: #333;
      font-size: 1rem;
    }

    footer {
      text-align: center;
      padding: 32px 24px;
      font-size: 0.75rem;
      color: #444;
      border-top: 1px solid rgba(255,255,255,0.05);
    }
  </style>
</head>
<body>

<header>
  <h1>pinepor</h1>
  <p>iOS App Developer</p>
</header>

<main>
  <h2>Apps</h2>
  <div class="app-list">

    <a href="/zombie-nurture-game/" class="app-card">
      <div class="app-icon" style="background: linear-gradient(135deg,#1a2a1a,#2a1a1a);">🧟</div>
      <div class="app-info">
        <h3>ゾンビを育てよ</h3>
        <p>ゾンビを世話して人間に回復させる育成ゲーム</p>
      </div>
      <span class="app-arrow">›</span>
    </a>

    <a href="https://apps.apple.com/jp/app/id6769116370" class="app-card" target="_blank">
      <div class="app-icon" style="background: linear-gradient(135deg,#1a1008,#2a1a08);">⛩️</div>
      <div class="app-info">
        <h3>御朱印の旅</h3>
        <p>全国2,005社の神社仏閣・限定御朱印SNS検索</p>
      </div>
      <span class="app-arrow">›</span>
    </a>

    <a href="https://apps.apple.com/jp/app/id6764491003" class="app-card" target="_blank">
      <div class="app-icon" style="background: linear-gradient(135deg,#0a1a0a,#1a2a08);">🗾</div>
      <div class="app-info">
        <h3>お土産ナビ</h3>
        <p>全国のお土産を探せるナビアプリ</p>
      </div>
      <span class="app-arrow">›</span>
    </a>

  </div>
</main>

<footer>
  <p>© 2026 YOSHITAKE HIROTA &nbsp;|&nbsp;
    <a href="https://sites.google.com/view/pinepor-privacy" style="color:#555; text-decoration:none;">プライバシーポリシー</a>
  </p>
</footer>

</body>
</html>
